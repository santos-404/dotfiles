# SSH session config (iPad/Termius)
# Mouse off so Termius handles native text selection/copy
set -g mouse off

# Easier copy mode entry (avoid [ which needs Shift on iPad)
bind u copy-mode
bind -T copy-mode-vi u send-keys -X page-up
bind -T copy-mode-vi d send-keys -X page-down

set -g allow-passthrough on
set -g set-clipboard on
