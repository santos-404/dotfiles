# Local session config (default scroll behavior)
# Enable mouse only for scroll wheel — enter copy-mode on scroll up, passthrough on scroll down
set -g mouse on
bind -n WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    "copy-mode -e; send-keys -M"
bind -n WheelDownPane send-keys -M
# In copy mode, release mouse button so terminal handles text selection natively
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
